<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>EMI Calculator</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="desktop-shell" aria-labelledby="app-title">
      <section class="app-window">
        <header class="title-bar">
          <p class="window-title">EMI Calculator</p>
          <button class="icon-button" id="resetBtn" type="button" aria-label="Reset calculator" title="Reset calculator">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M20 12a8 8 0 1 1-2.34-5.66"/>
              <path d="M20 4v5h-5"/>
            </svg>
          </button>
        </header>

        <div class="content-grid">
          <aside class="summary-pane" aria-label="Loan summary">
            <div>
              <p class="eyebrow">Monthly payment</p>
              <h1 id="app-title">Plan your EMI</h1>
            </div>

            <div class="hero-total">
              <span id="emiValue">Rs --</span>
              <small>estimated EMI per month</small>
            </div>

            <div class="quick-stats" aria-live="polite">
              <div>
                <span>Total payable</span>
                <strong id="totalPayable">--</strong>
              </div>
              <div>
                <span>Total interest</span>
                <strong id="totalInterest">--</strong>
              </div>
              <div>
                <span>Loan tenure</span>
                <strong id="tenureMonths">--</strong>
              </div>
            </div>
          </aside>

          <section class="calculator-pane" aria-label="EMI input form">
            <form id="emiForm">
              <label class="field">
                <span>Customer name</span>
                <input id="customerName" name="customerName" type="text" placeholder="ex. Kumara Swamy" autocomplete="name">
              </label>

              <label class="field" for="loanAmountText">
                <span>Loan amount</span>
                <input class="number-input" id="loanAmountText" name="loanAmount" type="number" min="0" step="1000" placeholder="ex. 500000" inputmode="decimal">
              </label>

              <label class="field" for="interestRateText">
                <span>Interest rate</span>
                <input class="number-input" id="interestRateText" name="interestRate" type="number" min="0" max="24" step="0.1" placeholder="ex. 8.5" inputmode="decimal">
              </label>

              <label class="field" for="loanDurationText">
                <span>Duration in years</span>
                <input class="number-input" id="loanDurationText" name="loanDuration" type="number" min="1" max="30" step="1" placeholder="ex. 5" inputmode="numeric">
              </label>
            </form>

            <div class="result-band" aria-live="polite">
              <div>
                <span>For</span>
                <strong id="customerLabel">Not entered</strong>
              </div>
              <div>
                <span>Principal</span>
                <strong id="principalLabel">--</strong>
              </div>
              <div>
                <span>Interest share</span>
                <strong id="interestShare">--</strong>
              </div>
            </div>

            <div class="bar-visual" aria-label="Principal and interest split">
              <div id="principalBar"></div>
              <div id="interestBar"></div>
            </div>
            <div class="legend">
              <span><i class="principal-dot"></i>Principal</span>
              <span><i class="interest-dot"></i>Interest</span>
            </div>

            <div class="export-actions" aria-label="Download EMI bill">
              <button class="download-button primary-download" id="downloadPdfBtn" type="button" disabled>
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                  <path d="M7 10l5 5 5-5"/>
                  <path d="M12 15V3"/>
                </svg>
                Download PDF
              </button>
              <button class="download-button" id="downloadDocBtn" type="button" disabled>
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                  <path d="M14 2v6h6"/>
                  <path d="M8 13h8"/>
                  <path d="M8 17h6"/>
                </svg>
                Download DOC
              </button>
            </div>
          </section>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
