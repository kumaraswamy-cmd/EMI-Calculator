<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>EMI Calculator</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="desktop-shell" aria-labelledby="app-title">
      <section class="app-window">
        <header class="title-bar">
          <div class="window-controls" aria-hidden="true">
            <span class="control close"></span>
            <span class="control minimize"></span>
            <span class="control maximize"></span>
          </div>
          <p class="window-title">EMI Calculator</p>
          <button class="icon-button" id="resetBtn" type="button" aria-label="Reset calculator" title="Reset calculator">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M20 12a8 8 0 1 1-2.34-5.66"/>
              <path d="M20 4v5h-5"/>
            </svg>
          </button>
        </header>

        <div class="content-grid">
          <aside class="summary-pane" aria-label="Loan summary">
            <div>
              <p class="eyebrow">Monthly payment</p>
              <h1 id="app-title">Plan your EMI</h1>
            </div>

            <div class="hero-total">
              <span id="emiValue">Rs 0</span>
              <small>estimated EMI per month</small>
            </div>

            <div class="quick-stats" aria-live="polite">
              <div>
                <span>Total payable</span>
                <strong id="totalPayable">Rs 0</strong>
              </div>
              <div>
                <span>Total interest</span>
                <strong id="totalInterest">Rs 0</strong>
              </div>
              <div>
                <span>Loan tenure</span>
                <strong id="tenureMonths">0 months</strong>
              </div>
            </div>
          </aside>

          <section class="calculator-pane" aria-label="EMI input form">
            <form id="emiForm">
              <label class="field">
                <span>Customer name</span>
                <input id="customerName" name="customerName" type="text" value="Aarav Kumar" autocomplete="name">
              </label>

              <div class="field">
                <div class="field-heading">
                  <label for="loanAmount">Loan amount</label>
                  <output id="loanAmountOutput" for="loanAmount">Rs 500,000</output>
                </div>
                <input id="loanAmount" name="loanAmount" type="range" min="0" max="10000000" step="50000" value="500000">
                <input class="number-input" id="loanAmountText" type="number" min="0" step="1000" value="500000" aria-label="Loan amount value">
              </div>

              <div class="field">
                <div class="field-heading">
                  <label for="interestRate">Interest rate</label>
                  <output id="interestRateOutput" for="interestRate">8.5%</output>
                </div>
                <input id="interestRate" name="interestRate" type="range" min="0" max="24" step="0.1" value="8.5">
                <input class="number-input" id="interestRateText" type="number" min="0" max="24" step="0.1" value="8.5" aria-label="Interest rate value">
              </div>

              <div class="field">
                <div class="field-heading">
                  <label for="loanDuration">Duration</label>
                  <output id="loanDurationOutput" for="loanDuration">5 years</output>
                </div>
                <input id="loanDuration" name="loanDuration" type="range" min="1" max="30" step="1" value="5">
                <input class="number-input" id="loanDurationText" type="number" min="1" max="30" step="1" value="5" aria-label="Loan duration value">
              </div>
            </form>

            <div class="result-band" aria-live="polite">
              <div>
                <span>For</span>
                <strong id="customerLabel">Aarav Kumar</strong>
              </div>
              <div>
                <span>Principal</span>
                <strong id="principalLabel">Rs 500,000</strong>
              </div>
              <div>
                <span>Interest share</span>
                <strong id="interestShare">0%</strong>
              </div>
            </div>

            <div class="bar-visual" aria-label="Principal and interest split">
              <div id="principalBar"></div>
              <div id="interestBar"></div>
            </div>
            <div class="legend">
              <span><i class="principal-dot"></i>Principal</span>
              <span><i class="interest-dot"></i>Interest</span>
            </div>
          </section>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
